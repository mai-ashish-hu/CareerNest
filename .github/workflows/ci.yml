name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check shared
        run: npm run type-check --workspace=@careernest/shared

      - name: Type check server
        run: npm run type-check --workspace=@careernest/server

      - name: Type check web
        run: npm run type-check --workspace=@careernest/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build --workspace=@careernest/server

      - name: Build web
        run: npm run build --workspace=@careernest/web

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f apps/server/Dockerfile -t careernest-server .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t careernest-web .
