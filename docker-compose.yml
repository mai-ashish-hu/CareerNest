services:
  # ─── Shared Backend API ───
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: careernest-server
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped
    networks:
      - careernest-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Super Admin Portal ───
  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    container_name: careernest-admin
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://server:4000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - careernest-network

  # ─── College / TPO Portal ───
  web-college:
    build:
      context: .
      dockerfile: apps/web-college/Dockerfile
    container_name: careernest-college
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://server:4000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - careernest-network

  # ─── Student Portal ───
  web-student:
    build:
      context: .
      dockerfile: apps/web-student/Dockerfile
    container_name: careernest-student
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://server:4000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - careernest-network

  # ─── Company Portal ───
  web-company:
    build:
      context: .
      dockerfile: apps/web-company/Dockerfile
    container_name: careernest-company
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://server:4000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - careernest-network

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: careernest-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-admin
      - web-college
      - web-student
      - web-company
      - server
    restart: unless-stopped
    networks:
      - careernest-network

networks:
  careernest-network:
    driver: bridge
